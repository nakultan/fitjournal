<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A84FF" />
    <meta
      name="description"
      content="Your personal fitness journal — workouts, weight, and progress, all on your device."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitJournal" />
    <title>FitJournal</title>
    <script>
      // Apply a saved Light/Dark override before first paint, so the page
      // never flashes the wrong theme. "System" stores no hint and lets the
      // CSS follow the OS. Mirrors lib/theme.ts.
      try {
        var t = localStorage.getItem('fj-theme')
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
